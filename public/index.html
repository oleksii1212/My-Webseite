<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOLDBET</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <a class="brand" id="brandHome" href="#home" title="Home">
          <div class="brand__logo">🎮</div>
          <span class="brand__name">GOLDBET</span>
        </a>

        <nav class="nav">
          <div class="nav__label">Games</div>
          <a class="nav__item" data-view="crash" href="#crash">
            <span class="nav__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"></polyline><polyline points="15 7 21 7 21 13"></polyline></svg>
            </span>
            Crash
          </a>
          <a class="nav__item" data-view="roulette" href="#roulette">
            <span class="nav__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="4.5"></circle><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"></circle></svg>
            </span>
            Roulette
          </a>
          <a class="nav__item" data-view="blackjack" href="#blackjack">
            <span class="nav__icon">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 3C9.3 6.6 5 8.8 5 12.4 5 14.9 6.9 16.4 8.9 16.4c1 0 1.9-.4 2.5-1.1-.2 1.8-.8 3-1.8 3.7V20h4.8v-1c-1-.7-1.6-1.9-1.8-3.7.6.7 1.5 1.1 2.5 1.1 2 0 3.9-1.5 3.9-4C19 8.8 14.7 6.6 12 3z"></path></svg>
            </span>
            Blackjack
          </a>
        </nav>

        <div class="sidebar__footer">
          <span class="nav__icon">💬</span> Live Chat
        </div>
      </aside>

      <!-- Main -->
      <div class="main">
        <header class="topbar">
          <button class="icon-btn icon-btn--home" id="homeBtn" title="Home" aria-label="Home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"></path><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"></path><path d="M9 21v-6h6v6"></path></svg>
          </button>

          <div class="topbar__right">
            <button class="btn btn--ghost" id="loginBtn">Log in</button>
            <button class="btn btn--primary" id="registerBtn">Sign up</button>

            <div class="user-area" id="userArea" hidden>
              <span class="user-area__name" id="userName"></span>
              <button class="avatar" id="avatarBtn" title="Account">
                <span id="avatarInitial">U</span>
              </button>
              <div class="balance-pill" id="balancePill">
                <span class="balance-pill__amount" id="balanceAmount">$ 0.00</span>
                <button class="balance-pill__add" id="balanceAdd" title="Add coins" aria-label="Add coins">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
              </div>
              <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
              </button>
              <div class="menu">
                <button class="icon-btn" id="menuBtn" title="Menu" aria-label="Menu">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="menu__dropdown" id="menuDropdown" hidden>
                  <button class="menu__item" id="logoutBtn">Log out</button>
                </div>
              </div>
            </div>
          </div>
        </header>

        <main class="content" id="content">
          <!-- Views are rendered here by app.js -->
        </main>
      </div>
    </div>

    <!-- Auth modal -->
    <div class="modal" id="authModal" hidden>
      <div class="modal__backdrop" data-close></div>
      <div class="modal__card">
        <button class="modal__close" data-close>&times;</button>
        <h2 class="modal__title" id="authTitle">Log in</h2>
        <p class="modal__subtitle">Play with virtual coins. No real money.</p>

        <form id="authForm" class="form">
          <label class="form__field">
            <span>Username</span>
            <input type="text" id="username" autocomplete="username" required />
          </label>
          <label class="form__field">
            <span>Password</span>
            <input type="password" id="password" autocomplete="current-password" required />
          </label>
          <p class="form__error" id="authError" hidden></p>
          <button type="submit" class="btn btn--primary btn--block" id="authSubmit">Log in</button>
        </form>

        <p class="modal__switch">
          <span id="switchText">Don't have an account?</span>
          <a href="#" id="switchLink">Sign up</a>
        </p>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
